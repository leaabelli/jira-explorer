services:
  jira-explorer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: jira-explorer:local
    ports:
      - '3000:3000'
    environment:
      # Jira Data Center connection
      JIRA_BASE_URL: ${JIRA_BASE_URL:?set JIRA_BASE_URL}
      JIRA_PAT: ${JIRA_PAT:?set JIRA_PAT}
      # optional default scope
      JIRA_PROJECT_KEYS: ${JIRA_PROJECT_KEYS:-}
      JIRA_LABELS: ${JIRA_LABELS:-}
      # server
      PORT: 3000
      DATA_DIR: /data
      # MCP safety
      MCP_ALLOW_WRITE: ${MCP_ALLOW_WRITE:-true}
      MCP_APPLY_TO_JIRA: ${MCP_APPLY_TO_JIRA:-false}
    volumes:
      - jira-explorer-data:/data
    restart: unless-stopped

volumes:
  jira-explorer-data:
